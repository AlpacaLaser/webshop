name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Kisbetűsre alakítjuk a repository owner nevét
      - name: Set lowercase image prefix
        run: echo "IMAGE_PREFIX_LOWER=ghcr.io/$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend/Webshop.API
          push: true
          tags: ${{ env.IMAGE_PREFIX_LOWER }}/webshop-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_PREFIX_LOWER }}/webshop-frontend:latest

      - name: Build and push mcp-server
        uses: docker/build-push-action@v5
        with:
          context: ./mcp-server
          push: true
          tags: ${{ env.IMAGE_PREFIX_LOWER }}/webshop-mcp-server:latest
