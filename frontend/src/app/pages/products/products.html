<div class="container mt-4">
  
  <!-- Oldal fejléce -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="bi bi-bag"></i> Termékek</h1>
  </div>

  <!-- Betöltés jelző -->
  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Betöltés...</span>
    </div>
    <p class="mt-2">Termékek betöltése...</p>
  </div>

  <!-- Hibaüzenet -->
  <div *ngIf="errorMessage" class="alert alert-danger">
    <i class="bi bi-exclamation-triangle"></i> {{ errorMessage }}
  </div>

  <!-- Termék kártyák -->
  <div *ngIf="!isLoading && !errorMessage" class="row row-cols-1 row-cols-md-3 g-4">
    
    <div *ngFor="let product of products" class="col">
      <div class="card h-100 shadow-sm">
        
        <!-- Termék kép -->
        <img [src]="product.imageUrl" 
             class="card-img-top" 
             [alt]="product.name"
             style="height: 200px; object-fit: cover;">
        
        <div class="card-body">
          <!-- Termék neve -->
          <h5 class="card-title">{{ product.name }}</h5>
          
          <!-- Kategória badge -->
          <span class="badge bg-secondary mb-2">{{ product.category }}</span>
          
          <!-- Leírás -->
          <p class="card-text text-muted">{{ product.description }}</p>
        </div>

        <div class="card-footer d-flex justify-content-between align-items-center">
          <!-- Ár -->
          <span class="fw-bold text-primary fs-5">
            {{ product.price | number:'1.0-0' }} Ft
          </span>
          
          <!-- Készlet -->
          <span class="badge" 
                [class.bg-success]="product.stock > 0"
                [class.bg-danger]="product.stock === 0">
            <i class="bi bi-box"></i>
            {{ product.stock > 0 ? product.stock + ' db' : 'Elfogyott' }}
          </span>
        </div>

      </div>
    </div>

    <!-- Ha nincs termék -->
    <div *ngIf="products.length === 0" class="col-12 text-center py-5">
      <i class="bi bi-bag-x fs-1 text-muted"></i>
      <p class="mt-2 text-muted">Nincsenek termékek az adatbázisban.</p>
    </div>

  </div>
</div>
